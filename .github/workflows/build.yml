name: Build and Push Container Image

on:
  schedule:
    - cron: "15 7 * * 1"
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      VCHORD: ${{ steps.versions.outputs.VCHORD }}
      VCHORD_SHORT: ${{ steps.versions.outputs.VCHORD_SHORT }}
      PGVECTOR: ${{ steps.versions.outputs.PGVECTOR }}
      PGVECTOR_SHORT: ${{ steps.versions.outputs.PGVECTOR_SHORT }}
    steps:
      - name: Get latest versions
        id: versions
        run: |
          VCHORD=$(curl -s https://api.github.com/repos/tensorchord/VectorChord/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "VCHORD=${VCHORD}" >> $GITHUB_OUTPUT
          VCHORD_SHORT=$(echo "$VCHORD" | cut -d. -f1,2)
          echo "VCHORD_SHORT=${VCHORD_SHORT}" >> $GITHUB_OUTPUT

          PGVECTOR=$(curl -s https://api.github.com/repos/pgvector/pgvector/tags | jq -r '.[0].name' | sed 's/^v//')
          echo "PGVECTOR=${PGVECTOR}" >> $GITHUB_OUTPUT
          PGVECTOR_SHORT=$(echo "$PGVECTOR" | cut -d. -f1,2)
          echo "PGVECTOR_SHORT=${PGVECTOR_SHORT}" >> $GITHUB_OUTPUT

  build:
    needs: versions
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - pg_major: "18"
            postgis_version: "3.6"
    permissions:
      contents: read
      packages: write
    env:
      BASE: ${{ matrix.pg_major }}-${{ matrix.postgis_version }}
      VCHORD: ${{ needs.versions.outputs.VCHORD }}
      PGVECTOR: ${{ needs.versions.outputs.PGVECTOR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # arm64 disabled: postgis base image only supports amd64
          # See: https://github.com/postgis/docker-postgis/issues/216
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.BASE }}-${{ needs.versions.outputs.VCHORD }}-${{ needs.versions.outputs.PGVECTOR }}
            ghcr.io/${{ github.repository }}:${{ env.BASE }}-${{ needs.versions.outputs.VCHORD_SHORT }}-${{ needs.versions.outputs.PGVECTOR_SHORT }}
            ghcr.io/${{ github.repository }}:${{ env.BASE }}
          build-args: |
            BASE=${{ env.BASE }}
            VCHORD=${{ env.VCHORD }}
            PGVECTOR=${{ env.PGVECTOR }}
